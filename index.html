<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>@thebloggerbeee — Travel · Lifestyle</title>
  <meta name="description" content="Travel, lifestyle, and content from @thebloggerbeee. Guides, tips, and stories from the road.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --gold: #C9A84C;
      --gold-light: #E8D5A3;
      --gold-dark: #8B6914;
      --gold-pale: #fffbf0;
      --gold-glow: rgba(201, 168, 76, 0.35);
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #5c5c5c;
      --color-text-tertiary: #999;
      --color-border-tertiary: rgba(201, 168, 76, 0.22);
      --color-background-primary: #fff;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --border-radius-lg: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 168, 76, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(232, 213, 163, 0.25), transparent 50%),
        radial-gradient(ellipse 50% 35% at 0% 80%, rgba(201, 168, 76, 0.12), transparent 45%),
        linear-gradient(165deg, #faf6ee 0%, #f3ead8 45%, #ebe0c8 100%);
      position: relative;
      overflow-x: hidden;
    }

    /* Gold ornamental artifacts */
    .artifact {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }
    .artifact-ring {
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.2);
    }
    .artifact-1 {
      width: 320px; height: 320px;
      top: -120px; right: -80px;
      border-width: 2px;
      opacity: 0.5;
    }
    .artifact-2 {
      width: 180px; height: 180px;
      bottom: 8%; left: -40px;
      border-color: rgba(201, 168, 76, 0.15);
    }
    .artifact-3 {
      width: 90px; height: 90px;
      top: 35%; left: 6%;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      border: none;
    }
    .artifact-4 {
      width: 140px; height: 140px;
      bottom: 18%; right: 5%;
      border: 1px dashed rgba(201, 168, 76, 0.25);
      opacity: 0.6;
    }
    .artifact-spark {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 0 12px var(--gold-glow);
    }
    .artifact-spark-1 { top: 22%; right: 18%; }
    .artifact-spark-2 { bottom: 32%; left: 12%; }
    .artifact-spark-3 { top: 58%; right: 8%; width: 4px; height: 4px; opacity: 0.7; }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    .profile-wrap {
      background: var(--color-background-primary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      padding: 2.75rem 2rem 2.25rem;
      text-align: center;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 24px 48px -12px rgba(139, 105, 20, 0.12),
        0 8px 24px -8px rgba(26, 26, 26, 0.06);
      position: relative;
      overflow: hidden;
    }

    .profile-wrap::before,
    .profile-wrap::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(201, 168, 76, 0.12);
      border-radius: 50%;
      pointer-events: none;
    }
    .profile-wrap::before { top: -50px; right: -50px; }
    .profile-wrap::after { bottom: -60px; left: -50px; width: 100px; height: 100px; opacity: 0.6; }

    .gold-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .gold-ornament-line {
      flex: 1;
      max-width: 72px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), var(--gold-light), transparent);
    }
    .gold-ornament-gem {
      width: 8px;
      height: 8px;
      transform: rotate(45deg);
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.15);
    }

    .avatar-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid transparent;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark), var(--gold)) border-box;
      padding: 4px;
      margin: 0 auto 1.25rem;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #fdf6e8 0%, #f0e0b8 50%, #e8d5a3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    .handle {
      font-family: var(--font-serif);
      font-size: 1.65rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 14px;
      font-weight: 300;
      color: var(--color-text-secondary);
      margin: 0 0 1.5rem;
      letter-spacing: 0.02em;
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 0.5px solid var(--gold);
      color: var(--gold-dark);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      background: var(--gold-pale);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .social-btn:hover {
      background: #fdf3d0;
      box-shadow: 0 4px 16px -4px var(--gold-glow);
      transform: translateY(-1px);
    }
    .social-btn i { font-size: 18px; color: var(--gold); }

    /* ── Offers CTA button ── */
    .offers-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 55%, var(--gold-dark) 100%);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 20px -6px rgba(139, 105, 20, 0.45), 0 1px 0 rgba(255,255,255,0.25) inset;
      transition: box-shadow 0.2s, transform 0.15s, filter 0.2s;
      margin-bottom: 1.5rem;
    }
    .offers-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px -8px rgba(139, 105, 20, 0.55), 0 1px 0 rgba(255,255,255,0.25) inset;
      filter: brightness(1.05);
    }
    .offers-btn:active { transform: translateY(0); }
    .offers-btn i { font-size: 18px; }

    .divider {
      border: none;
      height: 1px;
      margin: 0 0 1.5rem;
      background: linear-gradient(90deg, transparent, var(--color-border-tertiary), var(--gold-light), var(--color-border-tertiary), transparent);
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin: 0 0 0.85rem;
      opacity: 0.9;
    }

    .article-card {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 14px;
      padding: 14px 16px;
      text-align: left;
      text-decoration: none;
      background: linear-gradient(135deg, #fff 0%, var(--gold-pale) 100%);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .article-card:hover {
      border-color: var(--gold);
      box-shadow: 0 8px 24px -10px var(--gold-glow);
      transform: translateY(-2px);
    }
    .article-thumb {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fdf3d0 0%, #e8cfa0 50%, #d4b86a 100%);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 2px 8px -2px rgba(139, 105, 20, 0.2);
    }
    .article-meta { flex: 1; min-width: 0; }
    .article-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin: 0 0 3px;
      line-height: 1.35;
    }
    .article-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin: 0;
    }
    .article-arrow {
      color: var(--gold);
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .article-card:hover .article-arrow { transform: translateX(3px); }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--color-text-tertiary);
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap; border: 0;
    }

    @media (max-width: 480px) {
      .profile-wrap { padding: 2.25rem 1.35rem 2rem; }
      .handle { font-size: 1.45rem; }
      .artifact-1, .artifact-4 { opacity: 0.35; }
    }
  </style>
</head>
<body>

  <div class="artifact artifact-ring artifact-1" aria-hidden="true"></div>
  <div class="artifact artifact-ring artifact-2" aria-hidden="true"></div>
  <div class="artifact artifact-ring artifact-3" aria-hidden="true"></div>
  <div class="artifact artifact-ring artifact-4" aria-hidden="true"></div>
  <div class="artifact artifact-spark artifact-spark-1" aria-hidden="true"></div>
  <div class="artifact artifact-spark artifact-spark-2" aria-hidden="true"></div>
  <div class="artifact artifact-spark artifact-spark-3" aria-hidden="true"></div>

  <main class="page">
    <div class="profile-wrap">
      <h1 class="sr-only">@thebloggerbeee — influencer profile</h1>

      <div class="gold-ornament" aria-hidden="true">
        <span class="gold-ornament-line"></span>
        <span class="gold-ornament-gem"></span>
        <span class="gold-ornament-line"></span>
      </div>

      <div class="avatar-ring">
        <div class="avatar-inner">
          <img src="image.png" alt="@thebloggerbeee profile photo" width="102" height="102">
        </div>
      </div>

      <p class="handle">@thebloggerbeee</p>
      <p class="tagline">Travel · Lifestyle · Content Creator ✈️</p>

      <div class="social-links">
        <a class="social-btn" href="https://www.instagram.com/thebloggerbeee" target="_blank" rel="noopener noreferrer">
          <i class="ti ti-brand-instagram" aria-hidden="true"></i> Instagram
        </a>
        <a class="social-btn" href="https://www.youtube.com/@thebloggerbeee" target="_blank" rel="noopener noreferrer">
          <i class="ti ti-brand-youtube" aria-hidden="true"></i> YouTube
        </a>
      </div>

      <a class="offers-btn" href="affiliates/index.html">
        <i class="ti ti-tag" aria-hidden="true"></i>
        Get Offers for your next trip
      </a>

      <hr class="divider">

      <p class="section-label">Recent articles</p>

      <a class="article-card" href="japan/index.html" rel="noopener">
        <div class="article-thumb" aria-hidden="true">🇯🇵</div>
        <div class="article-meta">
          <p class="article-title">My Japan Trip — Everything You Need to Know</p>
          <p class="article-sub">Travel guide · thebloggerbeee.com</p>
        </div>
        <i class="ti ti-arrow-right article-arrow" aria-hidden="true"></i>
      </a>

      <p class="footer-note">✦ thebloggerbeee ✦</p>
    </div>
  </main>

</body>
</html>
