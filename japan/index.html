<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>@thebloggerbeee Japan — Travel Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --gold: #C9A84C;
      --gold-light: #E8D5A3;
      --gold-glow: rgba(201, 168, 76, 0.35);
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #5c5c5c;
      --color-border-tertiary: rgba(201, 168, 76, 0.22);
      --color-background-primary: #fff;
      --color-background-secondary: #f7f7f7;
      --border-radius-lg: 20px;
      --border-radius-md: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1rem 1.25rem 2rem;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 168, 76, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(232, 213, 163, 0.25), transparent 50%),
        radial-gradient(ellipse 50% 35% at 0% 80%, rgba(201, 168, 76, 0.12), transparent 45%),
        linear-gradient(165deg, #faf6ee 0%, #f3ead8 45%, #ebe0c8 100%);
      position: relative;
      overflow-x: hidden;
    }

    .artifact {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .artifact-ring {
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    .artifact-1 {
      width: 320px;
      height: 320px;
      top: -120px;
      right: -80px;
      border-width: 2px;
      opacity: 0.5;
    }

    .artifact-2 {
      width: 180px;
      height: 180px;
      bottom: 8%;
      left: -40px;
      border-color: rgba(201, 168, 76, 0.15);
    }

    .artifact-3 {
      width: 90px;
      height: 90px;
      top: 35%;
      left: 6%;
      background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
      border: none;
    }

    .artifact-4 {
      width: 140px;
      height: 140px;
      bottom: 18%;
      right: 5%;
      border: 1px dashed rgba(201, 168, 76, 0.25);
      opacity: 0.6;
    }

    .artifact-spark {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .artifact-spark-1 {
      top: 22%;
      right: 18%;
    }

    .artifact-spark-2 {
      bottom: 32%;
      left: 12%;
    }

    .artifact-spark-3 {
      top: 58%;
      right: 8%;
      width: 4px;
      height: 4px;
      opacity: 0.7;
    }

    .guide {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    .hero {
      background: #1a1a2e;
      color: #f5e6c8;
      padding: 2.5rem 2rem 2rem;
      border-radius: var(--border-radius-lg);
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #c9415a;
      opacity: 0.15;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #e8985e;
      opacity: 0.12;
      pointer-events: none;
    }

    .hero-tag {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e8985e;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .hero-title em {
      font-style: italic;
      color: #e8985e;
    }

    .hero-sub {
      font-size: 14px;
      color: #c5b99a;
      font-weight: 300;
      margin-top: 0.75rem;
    }

    .hero-dates {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid rgba(245, 230, 200, 0.2);
    }

    .hero-stat {}

    .hero-stat-val {
      font-size: 22px;
      font-weight: 500;
      color: #f5e6c8;
    }

    .hero-stat-label {
      font-size: 11px;
      color: #c5b99a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .hero-coupons {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid rgba(245, 230, 200, 0.2);
      position: relative;
      z-index: 1;
    }

    .hero-coupons-hint {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c5b99a;
      margin-bottom: 0.65rem;
    }

    .coupon-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .coupon-tab {
      appearance: none;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      background: rgba(245, 230, 200, 0.08);
      border: 0.5px solid rgba(232, 152, 94, 0.35);
      border-radius: 12px;
      padding: 12px 14px;
      color: #f5e6c8;
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .coupon-tab:hover {
      background: rgba(245, 230, 200, 0.14);
      border-color: rgba(232, 152, 94, 0.55);
    }

    .coupon-tab:active {
      transform: scale(0.97);
    }

    .coupon-tab:focus-visible {
      outline: 2px solid #e8985e;
      outline-offset: 2px;
    }

    .coupon-tab.copied {
      animation: coupon-shuttle 0.55s ease;
      border-color: #e8985e;
      background: rgba(232, 152, 94, 0.18);
      box-shadow: 0 0 0 1px rgba(232, 152, 94, 0.25), 0 8px 20px -8px rgba(232, 152, 94, 0.35);
    }

    @keyframes coupon-shuttle {
      0% {
        transform: scale(1);
      }

      25% {
        transform: scale(0.94);
      }

      55% {
        transform: scale(1.04);
      }

      100% {
        transform: scale(1);
      }
    }

    .coupon-brand {
      display: block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e8985e;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .coupon-code {
      display: block;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #f5e6c8;
      font-family: 'DM Sans', monospace;
    }

    .coupon-status {
      display: block;
      font-size: 10px;
      color: #c5b99a;
      margin-top: 6px;
      min-height: 14px;
      transition: color 0.2s;
    }

    .coupon-tab.copied .coupon-status {
      color: #e8985e;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      margin-bottom: 1rem;
      padding-left: 2px;
    }

    .day-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
    }

    .day-header:hover .day-toggle {
      background: #f0f0f0;
      border-color: #d0d0d0;
    }

    .day-header:focus-visible {
      outline: 2px solid #e8985e;
      outline-offset: 2px;
    }

    .day-num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .day-info {
      flex: 1;
      min-width: 0;
    }

    .day-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary, #1a1a1a);
    }

    .day-meta {
      font-size: 12px;
      color: var(--color-text-secondary, #666);
      margin-top: 2px;
    }

    .day-toggle {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f5f5f5;
      border: 0.5px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .day-chevron {
      font-size: 18px;
      color: var(--color-text-secondary, #555);
      transition: transform 0.25s ease;
      line-height: 1;
    }

    .day-chevron.open {
      transform: rotate(180deg);
    }

    .day-body {
      padding: 0 1.25rem 1.25rem;
      display: none;
    }

    .day-body.open {
      display: block;
    }

    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 4px;
    }

    a.place-chip {
      display: block;
      background: var(--color-background-secondary, #f7f7f7);
      border-radius: 8px;
      padding: 8px 10px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    a.place-chip:hover {
      background: #ececec;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    a.place-chip:focus-visible {
      outline: 2px solid #e8985e;
      outline-offset: 2px;
    }

    a.place-chip .place-chip-name::after {
      content: ' ↗';
      font-size: 11px;
      color: var(--color-text-secondary, #888);
      font-weight: 400;
    }

    .place-chip-icon {
      font-size: 14px;
      color: var(--color-text-secondary, #888);
      margin-bottom: 4px;
    }

    .place-chip-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary, #1a1a1a);
      line-height: 1.3;
    }

    .place-chip-type {
      font-size: 11px;
      color: var(--color-text-secondary, #666);
      margin-top: 2px;
    }

    .tip-box {
      background: #fdf6ec;
      border-left: 3px solid #e8985e;
      border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
      padding: 10px 12px;
      margin-top: 12px;
    }

    .tip-box-dark {
      background: var(--color-background-secondary);
    }

    .tip-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c97a2e;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .tip-text {
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.5;
    }

    .city-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem;
    }

    .city-divider-label {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    .city-divider-line {
      flex: 1;
      height: 0.5px;
      background: var(--color-border-tertiary);
    }

    .city-divider-flag {
      font-size: 18px;
    }

    .highlight-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .highlight-pill {
      font-size: 12px;
      background: #1a1a2e;
      color: #f5e6c8;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 400;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--color-text-secondary);
      padding: 1rem 0 0.5rem;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      body {
        padding: 0.75rem 1rem 1.5rem;
      }

      .artifact-1,
      .artifact-4 {
        opacity: 0.35;
      }

      .hero {
        padding: 1.75rem 1.25rem 1.5rem;
      }

      .hero-title {
        font-size: 32px;
      }

      .hero-dates {
        flex-wrap: wrap;
        gap: 1rem 1.25rem;
      }

      .hero-stat {
        min-width: calc(50% - 0.625rem);
      }

      .hero-stat-val {
        font-size: 20px;
      }

      .coupon-tabs {
        grid-template-columns: 1fr;
      }

      .city-divider-label {
        font-size: 18px;
      }

      .day-header {
        padding: 0.875rem 1rem;
        gap: 0.75rem;
      }

      .day-body {
        padding: 0 1rem 1rem;
      }

      .day-title {
        font-size: 14px;
      }

      .places-grid {
        grid-template-columns: 1fr;
      }

      .highlight-strip {
        justify-content: center;
      }
    }

    @media (max-width: 380px) {
      .hero-title {
        font-size: 28px;
      }

      .hero-stat {
        min-width: 100%;
      }

      .hero-stat-val {
        font-size: 18px;
      }
    }
  </style>
</head>

  <script>
    function toggle(header) {
      const body = header.nextElementSibling;
      const chevron = header.querySelector('.day-chevron');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
      header.setAttribute('aria-expanded', !isOpen);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderPlace(place) {
      const url = place.url || '#';
      const target = url.startsWith('http') ? ' target="_blank" rel="noopener noreferrer"' : '';
      return `<a class="place-chip" href="${escapeHtml(url)}"${target}>
    <div class="place-chip-icon"><i class="ti ${escapeHtml(place.icon)}" aria-hidden="true"></i></div>
    <div class="place-chip-name">${escapeHtml(place.name)}</div>
    <div class="place-chip-type">${escapeHtml(place.type)}</div>
  </a>`;
    }

    function renderDay(section) {
      const badge = section.badge;
      const places = section.places.map(renderPlace).join('');
      const tip = section.tip;
      return `<div class="day-card">
    <div class="day-header" role="button" tabindex="0" aria-expanded="true" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggle(this);}">
      <div class="day-num" style="background:${badge.background};color:${badge.color};">${section.day}</div>
      <div class="day-info">
        <div class="day-title">${escapeHtml(section.title)}</div>
        <div class="day-meta">${escapeHtml(section.meta)}</div>
      </div>
      <span class="day-toggle" aria-hidden="true"><i class="ti ti-chevron-down day-chevron open"></i></span>
    </div>
    <div class="day-body open">
      <div class="places-grid">${places}</div>
      <div class="tip-box">
        <div class="tip-label">${escapeHtml(tip.label)}</div>
        <div class="tip-text">${escapeHtml(tip.text)}</div>
      </div>
    </div>
  </div>`;
    }

    function renderSection(section) {
      if (section.type === 'city-divider') {
        const style = section.spaced ? ' style="margin-top:2rem;"' : '';
        return `<div class="city-divider"${style}>
      <div class="city-divider-line"></div>
      <div class="city-divider-label">${escapeHtml(section.label)}</div>
      <div class="city-divider-flag">${section.flag}</div>
      <div class="city-divider-line"></div>
    </div>`;
      }
      if (section.type === 'section-label') {
        return `<p class="section-label">${escapeHtml(section.text)}</p>`;
      }
      if (section.type === 'day') return renderDay(section);
      return '';
    }

    function renderGuide() {
      const data = JSON.parse(document.getElementById('guide-data').textContent);
      document.getElementById('guide-content').innerHTML = data.sections.map(renderSection).join('');
    }

    function copyCouponCodeSync(code) {
      const el = document.createElement('textarea');
      el.value = code;
      el.setAttribute('readonly', '');
      el.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;padding:0;border:0;opacity:0;';
      document.body.appendChild(el);
      el.focus();
      el.select();
      el.setSelectionRange(0, code.length);
      let ok = false;
      try {
        ok = document.execCommand('copy');
      } catch (_) {
        ok = false;
      }
      document.body.removeChild(el);
      return ok;
    }

    function showCouponCopied(tab, status, resetTab, resetMs) {
      tab.classList.remove('copied');
      void tab.offsetWidth;
      tab.classList.add('copied');
      if (status) status.textContent = 'Copied!';
      return setTimeout(resetTab, resetMs);
    }

    function initCouponTabs() {
      const defaultHint = 'Tap to copy';
      const resetMs = 1800;

      document.querySelectorAll('.coupon-tab').forEach((tab) => {
        const status = tab.querySelector('.coupon-status');
        let resetTimer;

        const resetTab = () => {
          tab.classList.remove('copied');
          if (status) status.textContent = defaultHint;
        };

        const handleCopy = () => {
          const code = tab.dataset.code;
          if (!code) return;

          clearTimeout(resetTimer);

          if (copyCouponCodeSync(code)) {
            resetTimer = showCouponCopied(tab, status, resetTab, resetMs);
            return;
          }

          if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(code)
              .then(() => { resetTimer = showCouponCopied(tab, status, resetTab, resetMs); })
              .catch(() => {
                if (status) status.textContent = 'Copy failed — try again';
                resetTimer = setTimeout(resetTab, resetMs);
              });
            return;
          }

          if (status) status.textContent = 'Copy failed — try again';
          resetTimer = setTimeout(resetTab, resetMs);
        };

        tab.addEventListener('click', handleCopy);
        tab.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handleCopy();
          }
        });
      });
    }

    function boot() {
      try {
        renderGuide();
      } catch (err) {
        console.error('Guide render failed:', err);
      }
      initCouponTabs();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
